<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Content-Security-Policy"
        content="
        default-src 'self' data:;
        img-src 'self' https://i.scdn.co data:;
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net;
        font-src https://fonts.gstatic.com https://cdn.jsdelivr.net;
        connect-src 'self' https://api.spotify.com https://accounts.spotify.com;
        ">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">

    <title>Spotify Widget App</title>

</head>
<body>

    <div class="background">
        <img src="" id="bg-img">
    </div>

    <div class="container">
        
        <div class="player-img">
            <img src="" class="active" id="cover">
        </div>

        <div class="content">
            
            <div class="info-song">
                <h2 id="song-name"></h2>
                <h3 id="artist-name"></h3>
            </div>

            <div class="player-progress" id="progress-container">
                <div class="progress" id="progress-bar"></div>
                <div class="music-duration">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="player-controls">
                <svg class="button" title="Previous" id="prev" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-skip-backward-fill" viewBox="0 0 16 16">
                    <path d="M.5 3.5A.5.5 0 0 0 0 4v8a.5.5 0 0 0 1 0V8.753l6.267 3.636c.54.313 1.233-.066 1.233-.697v-2.94l6.267 3.636c.54.314 1.233-.065 1.233-.696V4.308c0-.63-.693-1.01-1.233-.696L8.5 7.248v-2.94c0-.63-.692-1.01-1.233-.696L1 7.248V4a.5.5 0 0 0-.5-.5"/>
                </svg>

                <div class="buttonPlay" title="Play" id="play"></div>

                <svg class="button" title="Next" id="next" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-skip-forward-fill" viewBox="0 0 16 16">
                    <path d="M15.5 3.5a.5.5 0 0 1 .5.5v8a.5.5 0 0 1-1 0V8.753l-6.267 3.636c-.54.313-1.233-.066-1.233-.697v-2.94l-6.267 3.636C.693 12.703 0 12.324 0 11.693V4.308c0-.63.693-1.01 1.233-.696L7.5 7.248v-2.94c0-.63.693-1.01 1.233-.696L15 7.248V4a.5.5 0 0 1 .5-.5"/>
                </svg>
            </div>
            
        </div>
        

    </div>

    <script src="./renderer.js"></script>

</body>
</html>
