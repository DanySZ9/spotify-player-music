<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Content-Security-Policy"
        content="
        default-src 'self' data:;
        img-src 'self' https://i.scdn.co data:;
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net;
        font-src https://fonts.gstatic.com https://cdn.jsdelivr.net;
        connect-src 'self' https://api.spotify.com https://accounts.spotify.com;
        ">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">

    <title>Spotify Widget App</title>

</head>
<body>

    <div class="background">
        <img src="" id="bg-img">
    </div>

    <!-- LOGIN SCREEN -->
    <div class="screen" id="login-screen">
        <div class="login-card">
            <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" class="spotify-logo" viewBox="0 0 256 256"><path fill="#1ED760" d="M128 0C57.308 0 0 57.309 0 128c0 70.696 57.309 128 128 128c70.697 0 128-57.304 128-128C256 57.314 198.697.007 127.998.007zm58.699 184.614c-2.293 3.76-7.215 4.952-10.975 2.644c-30.053-18.357-67.885-22.515-112.44-12.335a7.98 7.98 0 0 1-9.552-6.007a7.97 7.97 0 0 1 6-9.553c48.76-11.14 90.583-6.344 124.323 14.276c3.76 2.308 4.952 7.215 2.644 10.975m15.667-34.853c-2.89 4.695-9.034 6.178-13.726 3.289c-34.406-21.148-86.853-27.273-127.548-14.92c-5.278 1.594-10.852-1.38-12.454-6.649c-1.59-5.278 1.386-10.842 6.655-12.446c46.485-14.106 104.275-7.273 143.787 17.007c4.692 2.89 6.175 9.034 3.286 13.72zm1.345-36.293C162.457 88.964 94.394 86.71 55.007 98.666c-6.325 1.918-13.014-1.653-14.93-7.978c-1.917-6.328 1.65-13.012 7.98-14.935C93.27 62.027 168.434 64.68 215.929 92.876c5.702 3.376 7.566 10.724 4.188 16.405c-3.362 5.69-10.73 7.565-16.4 4.187z"/></svg>
            <h1>Spotify Widget</h1>
            <p>Conecta tu cuenta para ver lo que estás escuchando</p>
            <button id="loginBtn">
                <i class="bi bi-spotify"></i>
                Iniciar sesión con Spotify
            </button>
        </div>
    </div>

    <!-- PLAYER SCREEN (oculto hasta hacer login) -->
    <div class="screen hidden" id="player-screen">
        <div class="container">
            
            <div class="player-img">
                <img src="" class="active" id="cover">
            </div>

            <div class="content">
                
                <div class="info-song">
                    <h2 id="song-name"></h2>
                    <h3 id="artist-name"></h3>
                </div>

                <div class="player-progress" id="progress-container">
                    <div class="progress" id="progress-bar"></div>
                    <div class="progress-thumb" id="progress-thumb"></div>
                    <div class="music-duration">
                        <span id="current-time">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>

                <div class="player-controls">
                    <svg class="button" title="Previous" id="prev" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M.5 3.5A.5.5 0 0 0 0 4v8a.5.5 0 0 0 1 0V8.753l6.267 3.636c.54.313 1.233-.066 1.233-.697v-2.94l6.267 3.636c.54.314 1.233-.065 1.233-.696V4.308c0-.63-.693-1.01-1.233-.696L8.5 7.248v-2.94c0-.63-.692-1.01-1.233-.696L1 7.248V4a.5.5 0 0 0-.5-.5"/>
                    </svg>

                    <div class="buttonPlay" title="Play/Pause" id="play"></div>

                    <svg class="button" title="Next" id="next" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M15.5 3.5a.5.5 0 0 1 .5.5v8a.5.5 0 0 1-1 0V8.753l-6.267 3.636c-.54.313-1.233-.066-1.233-.697v-2.94l-6.267 3.636C.693 12.703 0 12.324 0 11.693V4.308c0-.63.693-1.01 1.233-.696L7.5 7.248v-2.94c0-.63.693-1.01 1.233-.696L15 7.248V4a.5.5 0 0 1 .5-.5"/>
                    </svg>
                </div>
                
            </div>

        </div>
    </div>

    <script src="../node_modules/lottie-web/build/player/lottie.min.js"></script>
    <script src="./renderer.js"></script>

</body>
</html>
